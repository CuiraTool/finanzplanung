# Netlify-Build-Konfiguration für Next.js 15 + pnpm.
# Netlify erkennt Next.js automatisch via @netlify/plugin-nextjs (kommt mit
# der Next.js-Runtime mit). Diese Datei macht Build-Command und Node-Version
# explizit, damit es keine Überraschungen beim ersten Deploy gibt.

[build]
  # pnpm 9 ist nicht so streng mit Build-Scripts wie pnpm 10/11 (die mit
  # ERR_PNPM_IGNORED_BUILDS exit 1 werfen, auch wenn pnpm.onlyBuiltDependencies
  # gesetzt ist). Wir pinnen pnpm 9 via packageManager-Field in package.json.
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # PNPM_VERSION explizit, damit Netlifys Corepack-Detection nicht leer
  # ausläuft (sahen wir vorher: "Installing npm packages using pnpm version "
  # ohne Versionsnummer → Install bricht).
  PNPM_VERSION = "9.12.0"
  PNPM_FLAGS = "--frozen-lockfile"

# Next.js Plugin sollte automatisch installiert werden — falls nicht, manuell
# im Netlify-UI unter Site Settings → Build & Deploy → Build Plugins:
# "@netlify/plugin-nextjs" hinzufügen.

# ── HTTP-Security-Header ─────────────────────────────────────────────────
# Gelten für alle Routen. Schützen vor Clickjacking, MIME-Sniffing und
# Referrer-Leaks.
#
# Die Content-Security-Policy läuft BEWUSST im Report-Only-Modus: sie
# blockiert noch nichts, sondern meldet Verstösse nur in der Browser-Konsole.
# Grund: ein zu strenger CSP-Header kann die Live-Seite lautlos kaputtmachen
# (z.B. den Calendly-Buchungs-iframe im /kunde-Flow). Vorgehen: nach einem
# Deploy einmal /kunde durchklicken, Konsole auf CSP-Verstösse prüfen, dann
# den Header-Namen von "Content-Security-Policy-Report-Only" auf
# "Content-Security-Policy" ändern = scharfe Durchsetzung.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://calendly.com https://*.calendly.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
